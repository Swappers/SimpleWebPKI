{% extends "base.html" %}
{% block content %}
<section class="card auth-card">
  <p class="eyebrow">Accès administrateur</p>
  <h1>Connexion</h1>
  <form method="post" action="/login" class="stack">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="next_path" value="{{ next_path }}">
    <label>
      <span>Nom d’utilisateur</span>
      <input type="text" name="username" value="admin" autocomplete="username" inputmode="text" required>
    </label>
    <label>
      <span>Mot de passe</span>
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button class="button primary" type="submit">Se connecter</button>
  </form>
</section>
{% endblock %}
