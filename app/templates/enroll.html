{% extends "base.html" %}
{% block content %}
<section class="card">
  <p class="eyebrow">{{ ui.enroll_eyebrow }}</p>
  <h1>{{ ui.enroll_title }}</h1>
  <p class="lead">{{ ui.enroll_lead }}</p>
  <div class="warning">
    {{ ui.enroll_warning }}
  </div>
  {% if errors %}
  <div class="flash flash-error">
    {% for error in errors %}
    <div>{{ error }}</div>
    {% endfor %}
  </div>
  {% endif %}
  <form method="post" action="{{ lang_url('/enroll', lang) }}" class="stack form-grid">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      <span>{{ ui.enroll_username }}</span>
      <input type="text" name="username" value="{{ defaults.username }}" placeholder="fahd" required maxlength="64" pattern="[A-Za-z0-9_-]+">
    </label>
    <label>
      <span>{{ ui.enroll_device_name }}</span>
      <input type="text" name="device_name" value="{{ defaults.device_name }}" placeholder="iphone15" required maxlength="64" pattern="[A-Za-z0-9_-]+">
    </label>
    <label>
      <span>{{ ui.enroll_device_type }}</span>
      <select name="device_type" required>
        {% for device, label in device_types %}
        <option value="{{ device }}" {% if defaults.device_type == device %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      <span>{{ ui.enroll_duration }}</span>
      <select name="certificate_duration_days" required>
        {% for d in duration_options %}
        <option value="{{ d }}" {% if defaults.certificate_duration_days == d|string %}selected{% endif %}>{{ duration_label(d, lang) }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      <span>{{ ui.enroll_p12_password }}</span>
      <input type="password" name="p12_password" autocomplete="new-password" minlength="12" placeholder="{{ ui.enroll_p12_placeholder }}">
    </label>
    <button class="button primary" type="submit">{{ ui.enroll_submit }}</button>
  </form>
</section>
{% endblock %}
