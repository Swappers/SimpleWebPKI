<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="/">SimpleWebPKI</a>
      <nav class="topnav">
        <a href="/enroll">Enrôlement</a>
        <a href="/admin">Admin</a>
        {% if is_admin %}
        <form class="inline" method="post" action="/logout">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <button class="link-button" type="submit">Déconnexion</button>
        </form>
        {% else %}
        <a href="/login">Connexion</a>
        {% endif %}
      </nav>
    </header>
    <main class="content">
      {% if flashes %}
      <section class="flash-stack" aria-live="polite">
        {% for flash in flashes %}
        <div class="flash flash-{{ flash.category }}">{{ flash.message }}</div>
        {% endfor %}
      </section>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
